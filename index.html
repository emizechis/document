
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  #root {
    background: #0a0000;
    min-height: 600px;
    font-family: 'Share Tech Mono', monospace;
    position: relative;
    overflow: hidden;
    cursor: text;
  }

  .crt-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  }
  .crt-vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 51;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  }
  .crt-flicker {
    position: absolute; inset: 0; pointer-events: none; z-index: 52;
    animation: crtflicker 0.15s steps(1) infinite;
    background: rgba(255,0,0,0.012);
  }
  @keyframes crtflicker {
    0%,100%{opacity:1} 50%{opacity:0.97} 93%{opacity:1} 94%{opacity:0.6} 95%{opacity:1} 98%{opacity:0.85} 99%{opacity:1}
  }

  .glitch-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(255,0,0,0.15);
    animation: glitchscan 7s linear infinite;
    pointer-events: none; z-index: 49;
  }
  @keyframes glitchscan { from{top:-2px;opacity:0.5} 70%{opacity:0.1} to{top:100%;opacity:0} }

  .stars-layer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .star { position: absolute; background: rgba(180,0,0,0.4); border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from{opacity:var(--o1)} to{opacity:var(--o2)} }

  #terminal {
    position: relative; z-index: 10;
    min-height: 600px;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 0;
  }

  .term-topbar {
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(180,0,0,0.25);
    padding-bottom: 10px; margin-bottom: 16px;
  }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-dot.r { background: #5a0000; }
  .term-dot.y { background: #3a1a00; }
  .term-dot.g { background: #001a00; }
  .term-title {
    font-family: 'VT323', monospace; font-size: 13px;
    color: rgba(180,0,0,0.5); letter-spacing: 0.2em; margin-left: 6px;
    text-transform: uppercase;
  }
  .term-blink { animation: blinker 1.1s steps(1) infinite; }
  @keyframes blinker { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  .boot-seq { display: flex; flex-direction: column; gap: 2px; margin-bottom: 18px; }
  .boot-line {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: rgba(160,0,0,0.5); letter-spacing: 0.05em;
    opacity: 0; animation: fadeline 0.1s ease forwards;
  }
  @keyframes fadeline { to{opacity:1} }

  #prompt-area { display: flex; flex-direction: column; gap: 14px; }

  .term-output { display: flex; flex-direction: column; gap: 3px; }
  .term-line {
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    color: rgba(200,50,50,0.9); letter-spacing: 0.03em; line-height: 1.6;
    opacity: 0; animation: fadeline 0.05s ease forwards;
  }
  .term-line.dim { color: rgba(140,20,20,0.6); font-size: 11px; }
  .term-line.bright { color: rgba(255,80,80,1); }
  .term-line.white { color: rgba(210,200,200,0.82); }
  .term-line.head {
    font-family: 'VT323', monospace; font-size: 22px;
    color: #cc0000; letter-spacing: 0.15em;
    text-shadow: 0 0 10px rgba(200,0,0,0.5), 0 0 30px rgba(200,0,0,0.2);
    animation: fadeline 0.05s ease forwards, glitchtext 8s steps(1) infinite;
  }
  @keyframes glitchtext {
    0%,100%{text-shadow:0 0 10px rgba(200,0,0,0.5),0 0 30px rgba(200,0,0,0.2)}
    92%{transform:translate(0,0)}
    93%{transform:translate(-3px,0);filter:blur(1px)}
    94%{transform:translate(3px,0);filter:none}
    95%{transform:translate(0,0)}
  }
  .term-line.indent { padding-left: 20px; }
  .term-line.sep { color: rgba(120,0,0,0.4); font-size: 11px; }
  .term-line.warn { color: rgba(220,120,0,0.8); }
  .term-line.success { color: rgba(0,180,80,0.8); }
  .term-line.redacted { background: rgba(180,0,0,0.08); border-left: 2px solid rgba(180,0,0,0.35); padding-left: 10px; }

  .input-row {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .prompt-label {
    font-family: 'VT323', monospace; font-size: 18px;
    color: rgba(180,0,0,0.7); white-space: nowrap; user-select: none;
  }
  #code-input {
    background: transparent; border: none; outline: none;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    color: rgba(220,60,60,0.95); letter-spacing: 0.2em;
    caret-color: #cc0000; flex: 1; max-width: 280px;
  }
  #code-input::selection { background: rgba(180,0,0,0.3); }

  .timer-wrap { width: 100%; height: 1px; background: rgba(180,0,0,0.1); margin: 8px 0 2px; }
  .timer-bar { height: 100%; background: rgba(180,0,0,0.5); transform-origin: left; }

  #doc-panel { display: none; flex-direction: column; gap: 3px; }
</style>

<div id="root">
  <div class="crt-overlay"></div>
  <div class="crt-vignette"></div>
  <div class="crt-flicker"></div>
  <div class="glitch-line" style="animation-delay:0s"></div>
  <div class="glitch-line" style="animation-delay:3.5s"></div>
  <div class="stars-layer" id="stars"></div>

  <div id="terminal">
    <div class="term-topbar">
      <div class="term-dot r"></div>
      <div class="term-dot y"></div>
      <div class="term-dot g"></div>
      <span class="term-title">C.O.A — TERMINAL DE ACESSO RESTRITO v0.7.██ <span class="term-blink">█</span></span>
    </div>

    <div class="boot-seq" id="boot"></div>

    <div id="prompt-area">
      <div class="term-output" id="out"></div>
      <div id="doc-panel"></div>
      <div class="timer-wrap" id="timer-wrap" style="display:none"><div class="timer-bar" id="timer-bar"></div></div>
      <div class="input-row" id="input-row" style="display:none">
        <span class="prompt-label">root@coa-sys:~$&nbsp;</span>
        <input id="code-input" type="text" maxlength="24" autocomplete="off" spellcheck="false" />
        <span class="term-blink" style="font-family:'VT323';font-size:18px;color:rgba(180,0,0,0.7)">█</span>
      </div>
    </div>
  </div>
</div>

<script>
const starsLayer = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--o1:${(Math.random()*0.15+0.02).toFixed(2)};--o2:${(Math.random()*0.35+0.1).toFixed(2)};--d:${(Math.random()*5+2).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s;`;
  starsLayer.appendChild(s);
}

const root2 = document.getElementById('root');
let mx=0,my=0,cx=0,cy=0;
root2.addEventListener('mousemove',e=>{
  const r=root2.getBoundingClientRect();
  mx=(e.clientX-r.left)/r.width-0.5;
  my=(e.clientY-r.top)/r.height-0.5;
});
(function loop(){cx+=(mx-cx)*0.05;cy+=(my-cy)*0.05;starsLayer.style.transform=`translate(${cx*14}px,${cy*10}px)`;requestAnimationFrame(loop);})();

const bootEl=document.getElementById('boot');
const outEl=document.getElementById('out');
const docPanel=document.getElementById('doc-panel');
const inputRow=document.getElementById('input-row');
const timerWrap=document.getElementById('timer-wrap');
const timerBar=document.getElementById('timer-bar');
const inp=document.getElementById('code-input');

const bootLines=[
  {t:0,   txt:'[  0.000] BIOS: OMNITECH-C.O.A REV 7.2.1 — INICIALIZANDO...', cls:'dim'},
  {t:180, txt:'[  0.183] CPU: ARC-7 ANOMALOUS RESEARCH CORE — OK', cls:'dim'},
  {t:320, txt:'[  0.321] MEM: 4096MB ECC — VERIFICANDO...', cls:'dim'},
  {t:500, txt:'[  0.499] MEM: ████ SETORES CORROMPIDOS DETECTADOS', cls:'warn'},
  {t:680, txt:'[  0.680] DISK: /dev/coa0 — MONTANDO PARTIÇÃO RESTRITA', cls:'dim'},
  {t:820, txt:'[  0.819] NET:  LINK ESTABELECIDO [██.██.██.██]', cls:'dim'},
  {t:1000,txt:'[  1.001] SYS: CARREGANDO KERNEL C.O.A...', cls:'dim'},
  {t:1300,txt:'[  1.302] WARN: INTEGRIDADE DO SISTEMA COMPROMETIDA — 34%', cls:'warn'},
  {t:1550,txt:'[  1.551] CRIPT: MÓDULO DE CONTENÇÃO ATIVO', cls:'dim'},
  {t:1900,txt:'[  1.901] BOOT COMPLETO. SESSÃO INICIADA.', cls:'success'},
  {t:2200,txt:'────────────────────────────────────────────────', cls:'sep'},
  {t:2400,txt:'  SISTEMA DE AUTENTICAÇÃO RESTRITA — C.O.A v0.7', cls:'bright'},
  {t:2600,txt:'  ACESSO NÃO AUTORIZADO É MONITORADO E REGISTRADO', cls:'dim'},
  {t:2800,txt:'────────────────────────────────────────────────', cls:'sep'},
  {t:3000,txt:'', cls:''},
  {t:3100,txt:'  Insira o código de acesso para continuar.', cls:'white'},
  {t:3250,txt:'', cls:''},
];

bootLines.forEach(({t,txt,cls})=>{
  setTimeout(()=>{
    if(!txt){const d=document.createElement('div');d.className='term-line';d.innerHTML='&nbsp;';bootEl.appendChild(d);return;}
    const d=document.createElement('div');d.className=`term-line ${cls}`;d.textContent=txt;bootEl.appendChild(d);
  },t);
});
setTimeout(()=>{ inputRow.style.display='flex'; inp.focus(); }, 3400);

root2.addEventListener('click',()=>inp.focus());

let hjaciaUnlocked=false;
let activeTimer=null;

function addLine(txt,cls,container=outEl,delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      if(!txt){const d=document.createElement('div');d.className='term-line';d.innerHTML='&nbsp;';container.appendChild(d);res();return;}
      const d=document.createElement('div');d.className=`term-line ${cls||''}`;d.textContent=txt;container.appendChild(d);res();
    },delay);
  });
}

function clearDoc(){
  docPanel.innerHTML='';docPanel.style.display='none';
  timerWrap.style.display='none';
  if(activeTimer){clearInterval(activeTimer);activeTimer=null;}
}

function startTimer(onDone){
  timerWrap.style.display='block';
  timerBar.style.transform='scaleX(1)';
  const dur=10000;const start=Date.now();
  activeTimer=setInterval(()=>{
    const p=Math.max(0,1-(Date.now()-start)/dur);
    timerBar.style.transition='none';timerBar.style.transform=`scaleX(${p})`;
    if(p<=0){
      clearInterval(activeTimer);activeTimer=null;
      docPanel.style.opacity=1;
      let op=1;
      const fade=setInterval(()=>{op-=0.05;docPanel.style.opacity=op;if(op<=0){clearInterval(fade);clearDoc();if(onDone)onDone();}},80);
    }
  },50);
}

function showDoc(lines,onDone){
  clearDoc();
  inputRow.style.display='none';
  docPanel.innerHTML='';docPanel.style.display='flex';docPanel.style.opacity=1;
  lines.forEach(({txt,cls},i)=>{
    setTimeout(()=>{
      if(!txt){const d=document.createElement('div');d.className='term-line';d.innerHTML='&nbsp;';docPanel.appendChild(d);return;}
      const d=document.createElement('div');d.className=`term-line ${cls||''}`;d.textContent=txt;docPanel.appendChild(d);
    },i*80);
  });
  setTimeout(()=>startTimer(()=>{
    inputRow.style.display='flex';inp.value='';inp.focus();
    if(onDone)onDone();
  }),lines.length*80+200);
}

  {txt:''},

inp.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const val=inp.value;
  outEl.innerHTML='';

  if(val==='HJÁCIA'){
    hjaciaUnlocked=true;
    addLine(`root@coa-sys:~$ ${val}`, 'dim');
    addLine('Autenticando...','dim',outEl,80);
    addLine('[OK] CREDENCIAL ACEITA — NÍVEL 1','success',outEl,300);
    addLine('Carregando documento...','dim',outEl,480);
    setTimeout(()=>{ outEl.innerHTML=''; showDoc(docHjacia); },700);
  } else if(val==='oesoss'){
    if(!hjaciaUnlocked){
      addLine(`root@coa-sys:~$ ${'*'.repeat(val.length)}`,'dim');
      addLine('[ERRO] PROTOCOLO DE AUTORIZAÇÃO INCOMPLETO','warn',outEl,120);
      addLine('Execute autenticação primária antes de prosseguir.','dim',outEl,240);
      inp.value='';return;
    }
    addLine(`root@coa-sys:~$ ${val}`,'dim');
    addLine('Autenticando...','dim',outEl,80);
    addLine('[OK] CREDENCIAL ACEITA — NÍVEL 2 CLASSIFICADO','success',outEl,300);
    addLine('Carregando registro restrito...','dim',outEl,480);
    setTimeout(()=>{ outEl.innerHTML=''; showDoc(docOesoss); },700);
  } else {
    addLine(`root@coa-sys:~$ ${'*'.repeat(val.length)}`,'dim');
    addLine('[ERRO] CREDENCIAL INVÁLIDA — ACESSO NEGADO','warn',outEl,120);
    addLine(`[LOG] Tentativa registrada. IP: ██.██.██.██`,'dim',outEl,280);
    inp.value='';return;
  }
  inp.value='';
});
</script>
